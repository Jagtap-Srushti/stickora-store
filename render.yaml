services:
  - type: web
    name: stickora-backend
    runtime: java
    rootDir: Backend/stickora
    buildCommand: ./mvnw clean package
    startCommand: java -jar target/*.jar

    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: stickora-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist